<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>호랑의 투자 종목 히트맵</title>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <style>
        @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css");
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: 'Pretendard', sans-serif; }
        #title-bar { width: 100%; height: 40px; line-height: 40px; text-align: center; color: #e0e0e0; font-size: 19px; font-weight: 800; background: #111; border-bottom: 1px solid #222; position: relative; z-index: 10; }
        #heatmap { width: 100vw; height: calc(100vh - 40px); margin-top: -30px; display: block; }
        #footer { position: fixed; bottom: 0; left: 0; width: 100%; height: 25px; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(5px); border-top: 1px solid rgba(255, 255, 255, 0.1); display: flex; align-items: center; justify-content: space-between; padding: 0 25px; color: #666; font-size: 11px; z-index: 100; font-variant-numeric: tabular-nums; box-sizing: border-box; }
        .status-group { display: flex; align-items: center; gap: 25px; }
        .highlight { color: #888; font-weight: 600; margin-left: 4px; }
        #flash-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: white; opacity: 0; pointer-events: none; z-index: 9999; }
        .flash-active { animation: flash-ani 0.4s ease-out; }
        @keyframes flash-ani { 0% { opacity: 0.3; } 100% { opacity: 0; } }
        /* SOXL 주황색 깜빡이 */
        @keyframes orange-pulse { 0% { stroke: #FF8C00; stroke-width: 6; } 50% { stroke: #FFCC33; stroke-width: 10; } 100% { stroke: #FF8C00; stroke-width: 6; } }
        path[style*="stroke: rgb(255, 140, 0)"], path[style*="stroke: #ff8c00"] { animation: orange-pulse 1.5s infinite ease-in-out !important; }
    </style>
</head>
<body>
    <div id="flash-overlay"></div> 
    <div id="title-bar">호랑의 투자 종목 히트맵</div>
    <div id="heatmap"></div>
    <div id="footer">
        <div class="status-group">
            <div id="status-text">🔈 <span class="highlight">클릭 시 사운드 / 종목 클릭 시 차트</span></div>
            <div id="coin-status">🔄 <span class="highlight">코인 연결 중...</span></div>
        </div>
        <div id="last-update">✅ <span id="update-time" class="highlight">로딩 중...</span></div>
    </div>

    <script>
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSWbS7DD4dE4LUIcVrz8JeeG5BNpq6Fd8ZXPDYP0UD2iGNpF8j74aV3NaARkjwSYIxAwOlVML-0CE-Z/pub?gid=0&single=true&output=csv';
        let currentData = { l: [], c: [], v: [], bc: [], bw: [], fc: [], n: [], t: [] };
        let liveCoinStore = { "비트코인": { p: 0, c: 0 }, "이더리움": { p: 0, c: 0 }, "리플": { p: 0, c: 0 } };
        let sirenToggle = false; let sirenInterval = null; let audioCtx = null; let isMutedByClick = false;

        function playTone(freq, duration, vol) {
            if (!audioCtx || isMutedByClick) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        }

        window.addEventListener('mousedown', (e) => {
            if (e.target.closest('#heatmap')) return;
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                document.getElementById('status-text').innerHTML = "🔊 <span class='highlight'>사운드 온라인</span>";
            } else {
                isMutedByClick = !isMutedByClick;
                document.getElementById('status-text').innerHTML = isMutedByClick ? "🔇 <span class='highlight'>정지 (다음 업데이트 시 해제)</span>" : "🔊 <span class='highlight'>사운드 온라인</span>";
            }
        });

        async function fetchCoins() {
            try {
                const res = await fetch("https://api.upbit.com/v1/ticker?markets=KRW-BTC,KRW-ETH,KRW-XRP");
                const data = await res.json();
                data.forEach(coin => {
                    let n = coin.market === "KRW-BTC" ? "비트코인" : coin.market === "KRW-ETH" ? "이더리움" : "리플";
                    liveCoinStore[n] = { p: coin.trade_price, c: coin.signed_change_rate * 100 };
                });
                if (currentData.l.length > 0) updateRealtimeUI();
                document.getElementById('coin-status').innerHTML = "⚡ <span class='highlight'>코인 실시간 반영 중(20초)</span>";
            } catch (e) {}
        }

        function updateRealtimeUI() {
            let changed = false;
            for (let i = 0; i < currentData.l.length; i++) {
                if (["비트코인", "이더리움", "리플"].some(coin => currentData.l[i].includes(coin))) {
                    let target = currentData.l[i].includes("비트코인") ? "비트코인" : currentData.l[i].includes("이더리움") ? "이더리움" : "리플";
                    let p = liveCoinStore[target].p; let c = liveCoinStore[target].c;
                    if (p === 0) continue; 
                    let updatedLabel = `<b>${target}</b><br>₩${p.toLocaleString()}<br>${c.toFixed(2)}%`;
                    if (currentData.l[i] !== updatedLabel) {
                        currentData.l[i] = updatedLabel; currentData.c[i] = c;
                        currentData.fc[i] = "#FFFF00"; // 코인은 항상 노란색 유지
                        changed = true;
                    }
                }
            }
            if (changed) renderHeatmap(false);
        }

        async function fetchData() {
            try {
                const response = await fetch(SHEET_URL + '&cb=' + Date.now());
                const csvText = await response.text();
                const rows = csvText.split(/\r?\n/).filter(line => line.trim() !== "").map(line => line.split(','));
                let nextL = [], nextC = [], nextV = [], nextBC = [], nextBW = [], nextFC = [], nextN = [], nextT = [];
                isMutedByClick = false;

                for (let i = 1; i < rows.length; i++) {
                    const row = rows[i]; if (!row || row.length < 2) continue;
                    const name = row[0]?.replace(/"/g, "").trim();
                    const ticker = row[1]?.replace(/"/g, "").trim();
                    const priceStr = row[2]?.replace(/"/g, "").trim() || "";
                    const changeStr = row[3]?.replace(/"/g, "").trim() || "";
                    if (!name) continue;

                    let finalP, finalC;
                    if (["비트코인", "이더리움", "리플"].some(coin => name.includes(coin))) {
                        let t = name.includes("비트코인") ? "비트코인" : name.includes("이더리움") ? "이더리움" : "리플";
                        finalP = liveCoinStore[t].p; finalC = liveCoinStore[t].c;
                    } else {
                        finalC = parseFloat(changeStr); if (isNaN(finalC)) finalC = 0;
                        if (Math.abs(finalC) < 0.1 && changeStr.includes('.')) finalC *= 100;
                        finalP = parseFloat(priceStr.replace(/,/g, ''));
                    }
                    let sign = (ticker.toUpperCase().includes('KRX') || /^[0-9]/.test(ticker) || ["비트코인", "리플", "이더리움"].some(n => name.includes(n))) ? "₩" : "$";
                    
                    nextL.push(`<b>${name}</b><br>${isNaN(finalP) ? priceStr : sign + finalP.toLocaleString()}<br>${finalC.toFixed(2)}%`);
                    nextC.push(finalC);
                    nextV.push(Math.min(Math.max(Math.abs(finalC), 0.5), 10) + 2);
                    
                    // --- 글자색 로직 수정 (KB금융 오작동 방지) ---
                    let fColor = finalC > 0.5 ? "#FFDADA" : (finalC < -0.5 ? "#DADAFF" : "#FFFFFF");
                    const targetYellowItems = ["SOXL", "MAGS", "S&P 500", "QQQ", "RUSSELL 2000", "WPAY", "비트코인", "이더리움", "리플"];
                    const strictYellowItems = ["금", "은"]; // 이름이 완전히 일치할 때만 적용
                    
                    if (targetYellowItems.some(n => name.includes(n)) || strictYellowItems.includes(name)) {
                        fColor = "#FFFF00";
                    }
                    nextFC.push(fColor);
                    
                    nextN.push(name); nextT.push(ticker);
                    
                    // --- 테두리 로직 ---
                    if (["비트코인", "리플", "이더리움"].some(n => name.includes(n))) { nextBC.push("#00FF00"); nextBW.push(6); }
                    else if (name === "SOXL") { nextBC.push("#FF8C00"); nextBW.push(6); }
                    else if (name === "금" || name === "은") { nextBC.push("#FFFF00"); nextBW.push(6); }
                    else if (["MAGS", "S&P 500", "QQQ", "RUSSELL 2000", "WPAY"].some(n => name.includes(n))) { nextBC.push("#FFB300"); nextBW.push(6); }
                    else { nextBC.push("#FFFFFF"); nextBW.push(1); }
                }

                currentData = { l: nextL, c: nextC, v: nextV, bc: nextBC, bw: nextBW, fc: nextFC, n: nextN, t: nextT };
                renderHeatmap(false);
                const overlay = document.getElementById('flash-overlay');
                overlay.classList.remove('flash-active'); void overlay.offsetWidth; overlay.classList.add('flash-active');
                startSirenCheck();
                document.getElementById('update-time').innerText = new Date().toLocaleTimeString('ko-KR', { hour12: false }) + " 업데이트";
            } catch (e) {}
        }

        function renderHeatmap(isSirenTick) {
            if (!currentData.l.length) return;
            const displayColors = currentData.c.map(val => {
                if (Math.abs(val) >= 10.0) return (isSirenTick && sirenToggle) ? (val > 0 ? "#FF0000" : "#0000FF") : val;
                return val;
            });
            Plotly.react('heatmap', [{
                type: "treemap", labels: currentData.l, parents: Array(currentData.l.length).fill(""), values: currentData.v,
                hoverinfo: "none", textposition: "middle center", tiling: { pad: 0 },
                marker: { colors: displayColors, colorscale: [[0, '#1565C0'], [0.45, '#0D47A1'], [0.5, '#000000'], [0.55, '#8B0000'], [1, '#D32F2F']], cmin: -10, cmax: 10, line: { width: currentData.bw, color: currentData.bc } },
                textinfo: "label", textfont: { size: 17, family: "Pretendard", weight: 800, color: currentData.fc }
            }], { margin: { t: 0, l: 0, r: 0, b: 0 }, paper_bgcolor: "#000" }, { responsive: true, displayModeBar: false });
        }

        function startSirenCheck() {
            if (sirenInterval) clearInterval(sirenInterval);
            if (currentData.c.some(v => Math.abs(v) >= 10.0)) {
                sirenInterval = setInterval(() => { sirenToggle = !sirenToggle; renderHeatmap(true); playTone(sirenToggle ? 880 : 440, 0.4, 0.05); }, 500);
            }
        }

        document.getElementById('heatmap').addEventListener('mousedown', function(e) {
            const gd = document.getElementById('heatmap'); const target = e.target.closest('.slice') || e.target.closest('.text');
            if (!target) return; e.stopPropagation(); e.stopImmediatePropagation();
            const textContent = target.textContent || ""; let foundIdx = -1;
            for(let i=0; i<currentData.n.length; i++) { if (textContent.includes(currentData.n[i])) { foundIdx = i; break; } }
            if (foundIdx !== -1) {
                const name = currentData.n[foundIdx]; const ticker = currentData.t[foundIdx]; let url = "";
                if (name.includes("비트코인")) url = "https://upbit.com/exchange?code=CRIX.UPBIT.KRW-BTC";
                else if (name.includes("이더리움")) url = "https://upbit.com/exchange?code=CRIX.UPBIT.KRW-ETH";
                else if (name.includes("리플")) url = "https://upbit.com/exchange?code=CRIX.UPBIT.KRW-XRP";
                else if (ticker.includes("KRX") || /^[0-9]{5,6}$/.test(ticker)) { url = `https://www.google.com/finance/quote/${ticker.replace("KRX:", "")}:KRX`; }
                else { url = `https://www.google.com/search?q=google+finance+${encodeURIComponent(ticker || name)}`; }
                if (url) window.open(url, '_blank');
            }
            setTimeout(() => { Plotly.relayout(gd, { 'treemapcolorway': null }); }, 10);
        }, true);

        fetchCoins().then(() => fetchData());
        setInterval(fetchCoins, 20000); setInterval(fetchData, 60000);
        window.onresize = () => Plotly.Plots.resize('heatmap');
    </script>
</body>
</html>
